spring.application.name=profat
server.port=9002

# SQLite
spring.datasource.url=jdbc:sqlite:./data/profat.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# REST API auth: no default key is stored in git. For local dev, set profat.api-key in
# application-local.properties (gitignored) or export PROFAT_API_KEY. Blank key = no API auth unless
# profat.api-key-required=true (see application-prod.properties).
# profat.api-key=
profat.api-key-required=false

# Machine-specific settings (static sites, etc.):
# - Local: copy application-local.properties.example to application-local.properties (gitignored) and run with profile "local".
# - Production: see application-prod.properties; Docker sets SPRING_PROFILES_ACTIVE=prod.
