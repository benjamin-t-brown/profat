# Activated when SPRING_PROFILES_ACTIVE=prod (see Dockerfile).
#
# API auth: require a non-blank key at startup (set PROFAT_API_KEY or profat.api-key at deploy/runtime — never commit it).
profat.api-key-required=true

# Optional: serve static sites under /proxy/{route}/...; HTML GETs log a page-visit event server-side.
# Register a service first (POST /api/v1/services), then set service-id to that UUID.
profat.staticSites[0].route=revirtualis-net
profat.staticSites[0].staticFiles=/home/admin/revirtualis-net/dist
profat.staticSites[0].analyticsName=page_visit
profat.staticSites[0].serviceId=8008a1b0-27bb-4df4-ac8b-c12f4c6b8e40

profat.staticSites[1].route=pixelsaver1999
profat.staticSites[1].staticFiles=/home/admin/pixelsaver1999/src
profat.staticSites[1].analyticsName=page_visit
profat.staticSites[1].serviceId=1ab52b4a-7df0-4a67-8d25-c792aafdd4ab
